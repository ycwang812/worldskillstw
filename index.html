<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>第 56 屆全國技能競賽 倒數計時</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --pink: #E64C87;
    --teal: #18B6AD;
    --purple: #7B5CD6;
    --text: #555;
    --panel-bg: rgba(240,240,240,0.92);
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
}

/* 全螢幕背景 */
body {
    background: url("background.png") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: flex-start; /* 👈 左側 */
    align-items: center;
}

/* 左側倒數面板 */
.panel {
    width: 40%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 標題 */
.title {
    font-weight: 900;
    color: #333;
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-align: center;
}

/* 倒數排列 */
.timer {
    display: flex;
    gap: 42px;
}

.time-box {
    text-align: center;
}

/* 數字（跳動動畫） */
.number {
    font-weight: 900;
    color: var(--teal);
    line-height: 1;
}

.number.jump {
    animation: jump 0.35s ease;
}

@keyframes jump {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); }
    100% { transform: scale(1); }
}

.label {
    margin-top: 12px;
    color: var(--text);
    letter-spacing: 4px;
}

/* 📺 模式切換 */
/* 投影模式 */
body.projector .title { font-size: 44px; }
body.projector .number { font-size: 96px; }
body.projector .label { font-size: 24px; }

/* 官網模式 */
body.web .title { font-size: 32px; }
body.web .number { font-size: 64px; }
body.web .label { font-size: 18px; }

/* 開始提示 */
.start {
    font-size: 80px;
    font-weight: 900;
    color: var(--purple);
}
</style>
</head>

<!-- 🔁 模式切換：projector / web -->
<body class="projector">

<div class="panel">
    <div class="title">
        第56屆 全國技能競賽<br>
        56th National Skills Competition<br>
        倒數
    </div>

    <div class="timer" id="timer">
        <div class="time-box">
            <div class="number" id="days">0</div>
            <div class="label">天</div>
        </div>
        <div class="time-box">
            <div class="number" id="hours">00</div>
            <div class="label">小時</div>
        </div>
        <div class="time-box">
            <div class="number" id="minutes">00</div>
            <div class="label">分</div>
        </div>
        <div class="time-box">
            <div class="number" id="seconds">00</div>
            <div class="label">秒</div>
        </div>
    </div>
</div>

<script>
const target = new Date("2026-07-29T00:00:00");
const ids = ["days", "hours", "minutes", "seconds"];
let last = {};

function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
        document.getElementById("timer").innerHTML =
            '<div class="start">比賽開始！</div>';
        return;
    }

    const v = {
        days: Math.floor(diff / 86400000),
        hours: Math.floor(diff / 3600000) % 24,
        minutes: Math.floor(diff / 60000) % 60,
        seconds: Math.floor(diff / 1000) % 60
    };

    ids.forEach(id => {
        const el = document.getElementById(id);
        const val = id === "days" ? v[id] : String(v[id]).padStart(2, "0");

        if (last[id] !== val) {
            el.classList.remove("jump");
            void el.offsetWidth;
            el.classList.add("jump");
            el.textContent = val;
            last[id] = val;
        }
    });
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
